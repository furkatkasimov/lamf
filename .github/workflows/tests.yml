name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run tests
      run: pytest tests/ -v

    - name: Verify simulation reproducibility
      run: |
        python scripts/run_benchmark.py --dataset simulation --n-seeds 3 --output-dir /tmp/sim_ci
        test -f /tmp/sim_ci/sim_per_seed.csv
        test -f /tmp/sim_ci/sim_friedman.csv
